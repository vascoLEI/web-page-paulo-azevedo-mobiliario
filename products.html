<!DOCTYPE html>
<html lang="pt">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Produtos | Paulo Azevedo Mobiliário</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="logoicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --brown: #7a3b10;
      --brown-light: #a0521a;
      --brown-dark: #4e2509;
      --cream: #f8f4ef;
      --cream-dark: #ede7de;
      --warm-gray: #888078;
      --text: #2a1f17;
      --text-muted: #7a6e66;
      --white: #fff;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--cream);
      color: var(--text);
      font-family: 'DM Sans', Arial, sans-serif;
      padding-top: 80px;
    }

    body.lightbox-open { overflow: hidden; }
    body.lightbox-open header { display: none; }

    /* ── HEADER ── */
    header {
      position: fixed;
      top: 0; left: 0; width: 100%;
      z-index: 1000;
      background: rgba(248, 244, 239, 0.95);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 1px 0 rgba(122, 59, 16, 0.08);
      transition: box-shadow 0.3s ease;
    }

    header.header-small {
      box-shadow: 0 2px 12px rgba(42, 31, 23, 0.1);
    }

    .navbar {
      max-width: 1200px;
      margin: 0 auto;
      padding: 1rem 2.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: padding 0.3s ease;
    }

    header.header-small .navbar { padding: 0.6rem 2.5rem; }

    .logo { margin: 0; }
    .logo a { display: inline-block; }

    .logo-img {
      height: 48px;
      width: auto;
      display: block;
      transition: height 0.3s ease;
    }

    header.header-small .logo-img { height: 38px; }

    .nav-links {
      list-style: none;
      display: flex;
      gap: 2.5rem;
      align-items: center;
    }

    .nav-links a {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text);
      text-decoration: none;
      position: relative;
      transition: color 0.25s;
    }

    .nav-links a:hover { color: var(--brown); }

    .nav-links a::after {
      content: "";
      position: absolute;
      left: 0; bottom: -4px;
      width: 0; height: 1px;
      background: var(--brown);
      transition: width 0.4s ease;
    }

    .nav-links a:hover::after,
    .nav-links a.active-page::after { width: 100%; }

    .nav-toggle {
      display: none;
      background: none;
      border: none;
      font-size: 1.8rem;
      cursor: pointer;
      color: var(--text);
    }

    /* ── PAGE HERO ── */
    .page-hero {
      background: var(--brown-dark);
      padding: 4.5rem 2rem 3.5rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .page-hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background: url("images/antigas/sala Resultado.jpg") center/cover no-repeat;
      opacity: 0.12;
    }

    .page-hero-inner { position: relative; }

    .page-hero-label {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
      margin-bottom: 0.9rem;
    }

    .page-hero h1 {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(2.4rem, 5vw, 3.8rem);
      font-weight: 400;
      color: white;
      line-height: 1.1;
      margin-bottom: 0.8rem;
    }

    .page-hero p {
      color: rgba(255,255,255,0.6);
      font-size: 0.92rem;
      font-weight: 300;
      letter-spacing: 0.03em;
    }

    /* ── FILTERS ── */
    .filtros-wrapper {
      position: sticky;
      top: 80px;
      z-index: 900;
      background: rgba(248, 244, 239, 0.96);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(122, 59, 16, 0.1);
      padding: 1rem 2rem;
    }

    .filtros {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      justify-content: center;
    }

    .filtro-btn {
      padding: 0.45rem 1.1rem;
      border-radius: 999px;
      border: 1px solid rgba(122, 59, 16, 0.25);
      background: transparent;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      font-weight: 400;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      transition: background 0.2s, color 0.2s, border-color 0.2s, transform 0.1s;
    }

    .filtro-btn:hover {
      border-color: var(--brown);
      color: var(--brown);
      transform: translateY(-1px);
    }

    .filtro-btn.active {
      background: var(--brown-dark);
      border-color: var(--brown-dark);
      color: white;
    }

    /* ── PRODUCTS GRID ── */
    .produtos-page {
      max-width: 1200px;
      margin: 0 auto;
      padding: 3rem 2rem 5rem;
    }

    .produtos-grid-page {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1.5rem;
    }

    .produto-card {
      background: white;
      border-radius: 3px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      border: 1px solid rgba(122, 59, 16, 0.07);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      cursor: pointer;
    }

    .produto-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 36px rgba(42, 31, 23, 0.12);
    }

    .produto-card-img-wrap {
      overflow: hidden;
      position: relative;
    }

    .produto-card img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      display: block;
      transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .produto-card:hover img { transform: scale(1.06); }

    .produto-card-body {
      padding: 1rem 1.1rem 1.2rem;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .produto-card h3 {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 1.15rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 0.3rem;
      line-height: 1.25;
    }

    .produto-card p {
      font-size: 0.83rem;
      color: var(--text-muted);
      line-height: 1.55;
      font-weight: 300;
    }

    /* ── EMPTY STATE ── */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-muted);
    }

    .empty-state p {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.4rem;
      font-weight: 400;
    }

    /* ── LIGHTBOX ── */
    .lightbox {
      display: none;
      position: fixed;
      z-index: 2000;
      inset: 0;
      background: rgba(10, 5, 2, 0.92);
      justify-content: center;
      align-items: center;
      cursor: zoom-out;
    }

    .lightbox img {
      max-width: 90%;
      max-height: 90vh;
      border-radius: 2px;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.5);
    }

    /* ── FOOTER ── */
    footer {
      background: #1e1610;
      color: rgba(255,255,255,0.4);
      text-align: center;
      padding: 1.4rem;
      font-size: 0.78rem;
      letter-spacing: 0.03em;
    }

    footer a {
      color: rgba(255,255,255,0.5);
      text-decoration: none;
      transition: color 0.2s;
    }

    footer a:hover { color: rgba(255,255,255,0.85); }
    footer p + p { margin-top: 0.4rem; }

    /* ── REVEAL ── */
    .reveal {
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }
    .reveal.visible { opacity: 1; transform: translateY(0); }

    /* ── MOBILE ── */
    @media (max-width: 768px) {
      .navbar { padding: 0.8rem 1.5rem; }
      header.header-small .navbar { padding: 0.5rem 1.5rem; }

      .nav-toggle { display: block; }

      .nav-links {
        width: 100%;
        display: none;
        flex-direction: column;
        gap: 0;
        background: rgba(248, 244, 239, 0.98);
        padding: 0.8rem 0;
        border-top: 1px solid rgba(122, 59, 16, 0.1);
        margin-top: 0.5rem;
      }

      .nav-links.open { display: flex; }

      .nav-links li { width: 100%; text-align: center; }

      .nav-links a {
        display: block;
        padding: 0.75rem 1.5rem;
        font-size: 0.9rem;
      }

      .filtros-wrapper { top: 70px; padding: 0.75rem 1rem; }

      .produtos-page { padding: 2rem 1rem 4rem; }

      .produtos-grid-page {
        grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
        gap: 1rem;
      }

      .produto-card img { height: 160px; }
    }
  </style>
</head>

<body>
  <header>
    <nav class="navbar">
      <h1 class="logo">
        <a href="index.html">
          <img src="images/Logo.png" alt="Paulo Azevedo Mobiliário" class="logo-img">
        </a>
      </h1>
      <button class="nav-toggle" aria-label="Abrir menu">☰</button>
      <ul class="nav-links">
        <li><a href="products.html" class="active-page">Produtos</a></li>
        <li><a href="about.html">Sobre nós</a></li>
        <li><a href="contacts.html">Contactos</a></li>
      </ul>
    </nav>
  </header>

  <div class="page-hero">
    <div class="page-hero-inner">
      <p class="page-hero-label">Paulo Azevedo Mobiliário</p>
      <h1>Os nossos produtos</h1>
    </div>
  </div>

  <div class="filtros-wrapper">
    <div class="filtros">
      <button class="filtro-btn active" data-filter="all">Todos</button>
      <button class="filtro-btn" data-filter="quarto">Quartos</button>
      <button class="filtro-btn" data-filter="colchao">Colchões</button>
      <button class="filtro-btn" data-filter="aparador">Aparadores</button>
      <button class="filtro-btn" data-filter="base">Bases TV</button>
      <button class="filtro-btn" data-filter="sofa">Sofás</button>
      <button class="filtro-btn" data-filter="cadeira">Cadeiras</button>
      <button class="filtro-btn" data-filter="mesa">Mesas</button>
    </div>
  </div>

  <section class="produtos-page">
    <div class="produtos-grid-page" id="produtos-grid"></div>
  </section>

  <footer>
    <p>&copy; 2025 Paulo Azevedo Mobiliário</p>
    <p>
      <a href="privacidade.html">Política de Privacidade</a> &nbsp;|&nbsp;
      <a href="cookies.html">Política de Cookies</a>
    </p>
  </footer>

  <div class="lightbox" id="lightbox-produto">
    <img src="" alt="Produto ampliado">
  </div>

  <script src="listOfProducts.js"></script>

  <script>
    function renderProducts(list) {
      const grid = document.getElementById('produtos-grid');
      if (!grid) return;

      if (list.length === 0) {
        grid.innerHTML = `<div class="empty-state"><p>Nenhum produto nesta categoria.</p></div>`;
        return;
      }

      grid.innerHTML = list.map((p, i) => `
        <article class="produto-card reveal" data-categoria="${p.categoria}" style="transition-delay:${(i % 12) * 40}ms">
          <div class="produto-card-img-wrap">
            <img src="${p.imagem}" alt="${p.nome}" loading="lazy">
          </div>
          <div class="produto-card-body">
            <h3>${p.nome}</h3>
            <p>${p.descricao || ""}</p>
          </div>
        </article>
      `).join('');

      observeReveal();
      initProductLightbox();
    }
  </script>

  <script>
    function initFilters() {
      const filterButtons = document.querySelectorAll(".filtro-btn");

      filterButtons.forEach(btn => {
        btn.addEventListener("click", () => {
          const filter = btn.dataset.filter;
          const products = document.querySelectorAll(".produto-card");

          filterButtons.forEach(b => b.classList.remove("active"));
          btn.classList.add("active");

          products.forEach(prod => {
            const show = filter === "all" || prod.dataset.categoria === filter;
            prod.style.display = show ? "flex" : "none";
          });
        });
      });
    }
  </script>

  <script>
    function setupHeaderShrink() {
      const header = document.querySelector('header');
      if (!header) return;
      window.addEventListener('scroll', () => {
        header.classList.toggle('header-small', window.scrollY > 50);
      });
    }
  </script>

  <script>
    function setupMobileMenu() {
      const toggle = document.querySelector('.nav-toggle');
      const navLinks = document.querySelector('.nav-links');
      if (!toggle || !navLinks) return;
      toggle.addEventListener('click', () => navLinks.classList.toggle('open'));
    }
  </script>

  <script>
    function initProductLightbox() {
      const lightbox = document.getElementById('lightbox-produto');
      if (!lightbox) return;
      const lightboxImg = lightbox.querySelector('img');

      document.querySelectorAll('.produto-card img').forEach(img => {
        img.addEventListener('click', () => {
          lightboxImg.src = img.src;
          lightbox.style.display = 'flex';
          document.body.classList.add('lightbox-open');
        });
      });

      function close() {
        lightbox.style.display = 'none';
        lightboxImg.src = '';
        document.body.classList.remove('lightbox-open');
      }

      lightbox.addEventListener('click', e => { if (e.target === lightbox) close(); });
      document.addEventListener('keydown', e => { if (e.key === 'Escape') close(); });
    }
  </script>

  <script>
    let revealObserver;

    function observeReveal() {
      const els = document.querySelectorAll('.reveal:not(.visible)');
      if (!revealObserver) {
        revealObserver = new IntersectionObserver((entries) => {
          entries.forEach(e => {
            if (e.isIntersecting) {
              e.target.classList.add('visible');
              revealObserver.unobserve(e.target);
            }
          });
        }, { threshold: 0.08 });
      }
      els.forEach(el => revealObserver.observe(el));
    }
  </script>

  <script>
    window.addEventListener('load', () => {
      renderProducts(PRODUCTS);
      initFilters();
      setupHeaderShrink();
      setupMobileMenu();
    });
  </script>

</body>
</html>
